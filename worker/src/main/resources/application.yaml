spring:
  application:
    name: multistepform-worker
  main:
    keep-alive: true

  temporal:
    connection:
      target: ${TEMPORAL_ADDRESS:localhost:7233}
    workers-auto-discovery:
      packages:
        - io.temporal.demos.multistepform

logging:
  structured:
    format:
      console: ecs

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
